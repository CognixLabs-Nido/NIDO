name: CI — Main

on:
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Solo el proyecto `unit` (jsdom, sin red): NO arrastra el proyecto `rls`
      # (src/test/rls/** + src/test/audit/**). Los tests RLS/audit hablan con el
      # remoto compartido y corren SERIALIZADOS en `rls-suite.yml`; correrlos aquí
      # metía a ci-main como un segundo ejecutor concurrente de la suite RLS sin
      # serializar → colisión de fixtures con el nightly/dispatch (rompió tras #195).
      # Por eso NO se usa `npm test` genérico: se nombra el proyecto explícito, igual
      # que ci-pr.yml. Sin `secrets` de Supabase ni flags de migración: `unit` no toca BD.
      - name: Unit tests
        run: npm run test:unit
