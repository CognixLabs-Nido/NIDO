name: RLS suite (remote DB)

# Suites RLS/audit que hablan con la BD Supabase remota compartida. SACADAS del CI de
# cada PR (ci-pr.yml) para no saturar el pool ni quemar minutos: aquí corren aisladas,
# SERIALIZADAS y solo bajo demanda o de madrugada.
#
# - Serialización DENTRO del run: vitest usa `fileParallelism: false` (vitest.config.ts)
#   → los ficheros RLS corren de uno en uno contra el remoto (nunca en paralelo).
# - Serialización ENTRE runs: el bloque `concurrency` (group global + cancel-in-progress
#   false) encola cualquier run solapado → NUNCA hay dos runs tocando la BD a la vez.

# DISPARADORES (D-2):
#   - pull_request → corre AUTOMÁTICAMENTE en cada PR a main. Antes dependía de que
#     alguien lanzase la suite a mano en cada PR (se hizo 20+ veces); ese agujero se cierra.
#   - workflow_dispatch → lanzable a mano (GitHub UI / `gh workflow run rls-suite.yml`).
#   - schedule (nightly) → red de seguridad de madrugada.
# Los tres comparten el MISMO job, secrets y flags `*_MIGRATION_APPLIED` (env: del job):
# un run disparado por PR es idéntico a uno por dispatch o por nightly.
#
# Notas del modelo actual (decisión de Jose, D-2):
#   (a) Corre contra el REMOTO COMPARTIDO (mismo proyecto Supabase que el piloto). Por eso
#       el `globalSetup` hace un wipe global de `@nido.test` y por eso TODO run va
#       SERIALIZADO bajo el `concurrency.group: rls-suite` (cancel-in-progress: false; ver
#       bloque abajo): nunca dos runs tocando la BD a la vez (se pisarían el wipe). Hoy es
#       seguro porque NO hay datos reales (ANAIA es un piloto sin familias dadas de alta);
#       el wipe no puede destrozar nada real.
#   (b) CAVEAT de GitHub concurrency: solo mantiene 1 run en curso + 1 en cola. Con 3+ PRs
#       (o PRs + nightly) solapados, el pending intermedio se CANCELA — NO falla, queda
#       "cancelled" → hay que RE-RUN manual de ese PR (pestaña Actions o `gh run rerun`).
#       Con la concurrencia de PRs habitual aquí no suele pasar.
#   (c) SOLUCIÓN DE RAÍZ (pendiente de PRE-PRODUCCIÓN): una BD de test DEDICADA (proyecto
#       Supabase aparte, migraciones por `db push` desde CI) elimina la contención, valida
#       el esquema DEL PR y quita el baile de flags. No se monta ahora (el free tier no da
#       un 3er proyecto y no se contrata Pro hasta que entren datos reales). Al entrar datos
#       reales, montarla ANTES de seguir corriendo esto contra el remoto compartido.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {} # lanzable a mano (GitHub UI / `gh workflow run rls-suite.yml`).
  schedule:
    # 02:00 UTC = 03:00 CET / 04:00 CEST — madrugada Europe/Madrid, baja actividad.
    - cron: '0 2 * * *'

# Un único run de la suite RLS a la vez (global, no por rama): si llega otro (nightly +
# dispatch manual solapados), se ENCOLA en vez de correr en paralelo. No cancelamos el
# que ya corre (cancel-in-progress: false) para no dejar la BD a medias.
#
# REGLA (no romper): TODO workflow que ejecute el proyecto `rls` (`npm run test:rls` o
# `vitest run --project rls`) escribe fixtures en el remoto compartido y DEBE ir bajo
# este mismo bloque `concurrency: { group: rls-suite, cancel-in-progress: false }`. Hoy
# el único ejecutor es este workflow: ci-main.yml y ci-pr.yml corren solo `--project unit`
# (sin BD) a propósito, por eso NO se les mete en este grupo (serializaría lo que no
# compite). Si algún día otro workflow corre rls, se une a este grupo — no a uno nuevo.
#
# RESIDUAL (fuera del alcance de GitHub concurrency): lanzar `npm run test:rls` EN LOCAL
# mientras puede correr el nightly colisiona con él (dos wipes+writes sobre el mismo
# remoto). No lo previene este bloque; evítalo manualmente.
concurrency:
  group: rls-suite
  cancel-in-progress: false

jobs:
  rls:
    name: RLS + audit (serializado, remoto)
    runs-on: ubuntu-latest
    # Corta un cuelgue por saturación del pool en vez de dejarlo hasta el tope de 6h.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Solo el proyecto `rls` (src/test/rls/** + src/test/audit/**) contra el remoto.
      - name: RLS + audit tests
        run: npm run test:rls
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Flags de gated-tests: todas las migraciones están aplicadas en el remoto.
          F5B34_MIGRATION_APPLIED: '1'
          RECORDATORIOS_MIGRATION_APPLIED: '1'
          EVENTOS_MIGRATION_APPLIED: '1'
          AGENDA_MIGRATION_APPLIED: '1'
          F8_MIGRATION_APPLIED: '1'
          F8_RW0_MIGRATION_APPLIED: '1'
          F8_3B_MIGRATION_APPLIED: '1'
          F9_0_MIGRATION_APPLIED: '1'
          F9_5_0_MIGRATION_APPLIED: '1'
          F10_0_MIGRATION_APPLIED: '1'
          F10_2_MIGRATION_APPLIED: '1'
          F10_3_MIGRATION_APPLIED: '1'
          F11_ALTA_P1_MIGRATION_APPLIED: '1'
          F11_ALTA_P2A_MIGRATION_APPLIED: '1'
          F11_ALTA_P2B_MIGRATION_APPLIED: '1'
          F11_ALTA_P3A_MIGRATION_APPLIED: '1'
          F11_ALTA_P3B1_MIGRATION_APPLIED: '1'
