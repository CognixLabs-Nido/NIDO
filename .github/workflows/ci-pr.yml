name: CI — Pull Request

on:
  pull_request:
    branches: [main]

# Cancela runs anteriores del mismo PR al pushear un commit nuevo (ahorra minutos).
concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nombre de job SIN cambiar ("Typecheck, Lint, Test") para no romper el required
  # status check de la protección de rama. Solo corre lo RÁPIDO y sin BD: typecheck,
  # lint, format, UNIT (proyecto vitest `unit`, excluye RLS/audit) y build. Las suites
  # RLS/audit (que hablan con el remoto compartido) se sacaron a `rls-suite.yml`
  # (on-demand + nightly, serializadas) para no saturar la BD ni quemar minutos en cada PR.
  checks:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # Solo el proyecto `unit` (excluye src/test/rls/** y src/test/audit/**): sin red,
      # sin credenciales del remoto. Los tests RLS/audit corren en `rls-suite.yml`.
      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
